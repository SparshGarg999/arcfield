services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arcfield
      POSTGRES_PASSWORD: arcfield
      POSTGRES_DB: arcfield
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arcfield -d arcfield"]
      interval: 2s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: arcfield
      DB_PASSWORD: arcfield
      DB_NAME: arcfield
      DB_SSLMODE: disable
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
